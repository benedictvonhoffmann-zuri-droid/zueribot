events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker embedded DNS — resolve upstreams at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;

        # Bünzli theme stylesheet served directly by nginx
        location = /bz-theme.css {
            alias /etc/nginx/bz-theme.css;
            add_header Cache-Control "public, max-age=300";
            default_type text/css;
        }

        # Open WebUI (main chat interface)
        location / {
            set $owui "open-webui:8080";
            proxy_pass http://$owui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";

            # Inject Bünzli theme stylesheet into the OWU HTML shell
            sub_filter '</head>' '<link rel="stylesheet" href="/bz-theme.css"></head>';
            sub_filter_once on;

            # Required for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ZüriBot API (direct access if needed)
        location /zuribot/ {
            set $zb "zuribot:8000";
            rewrite ^/zuribot(/.*)$ $1 break;
            proxy_pass http://$zb;
            proxy_set_header Host $host;

            # Required for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }
    }
}
