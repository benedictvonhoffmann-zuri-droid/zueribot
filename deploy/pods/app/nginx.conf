events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker embedded DNS — resolve upstreams at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Gzip for static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;

    server {
        listen 80;
        client_max_body_size 50m;

        root /usr/share/nginx/html;
        index index.html;

        # ZüriBot API (proxied, privacy-hardened)
        location /zuribot/ {
            # ── Privacy: no access logs, no identifying headers forwarded ──
            access_log off;

            # Dev CORS: allow the Astro dev server on any localhost port.
            if ($http_origin ~* ^https?://localhost(:[0-9]+)?$) {
                set $cors_origin $http_origin;
            }
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"      always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            if ($request_method = OPTIONS) {
                return 204;
            }

            set $zb "zuribot:8000";
            rewrite ^/zuribot(/.*)$ $1 break;
            proxy_pass http://$zb;
            proxy_set_header Host $host;

            # Strip client-identifying headers before forwarding upstream.
            proxy_set_header X-Real-IP         "";
            proxy_set_header X-Forwarded-For   "";
            proxy_set_header X-Forwarded-Host  "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_set_header User-Agent        "bunzli/1.0";
            proxy_set_header Referer           "";
            proxy_set_header Cookie            "";

            # Strip upstream CORS headers so only nginx's survive (prevents duplicates)
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;

            # Required for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # Hashed, immutable build assets — cache hard
        location /_astro/ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Astro static site (output: 'static', trailingSlash: 'always')
        # Try the URI as-is, then as a directory (index.html), then 404.
        location / {
            access_log off;
            try_files $uri $uri/index.html $uri/ =404;
        }
    }
}
