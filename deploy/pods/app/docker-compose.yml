name: bunzli-app

services:

  edge:
    image: caddy:2
    container_name: bunzli-app-edge
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./Caddyfile:/etc/caddy/Caddyfile:ro"
      - "./caddy/data:/data"
      - "./caddy/config:/config"
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
    restart: unless-stopped
    networks:
      - bunzli-app-net

  api:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: bunzli-app-api
    expose:
      - "8000"
    env_file:
      - ../../../.env
    restart: unless-stopped
    networks:
      - bunzli-app-net

  landing:
    build:
      context: ../../..
      dockerfile: deploy/pods/app/Dockerfile.landing
    container_name: bunzli-app-landing
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - bunzli-app-net

networks:
  bunzli-app-net:
    driver: bridge
