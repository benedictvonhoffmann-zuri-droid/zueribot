services:

  zuribot:
    build:
      context: ..
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ../.env
    restart: unless-stopped
    networks:
      - zuribot-net

  searxng:
    image: searxng/searxng:latest
    expose:
      - "8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
      - SEARXNG_SECRET=zuribot-searxng-secret
    restart: unless-stopped
    networks:
      - zuribot-net

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - zuribot
    restart: unless-stopped
    networks:
      - zuribot-net

networks:
  zuribot-net:
    driver: bridge
