services:

  zuribot:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    restart: unless-stopped
    networks:
      - zuribot-net

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
      - SEARXNG_SECRET=zuribot-searxng-secret
    restart: unless-stopped
    networks:
      - zuribot-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://zuribot:8000/v1
      - OPENAI_API_KEY=zuribot
      - WEBUI_NAME=Bünzli AI
      - DEFAULT_LOCALE=en-US
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - zuribot
    restart: unless-stopped
    networks:
      - zuribot-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./openwebui-theme.css:/etc/nginx/bz-theme.css:ro
    depends_on:
      - zuribot
      - open-webui
    restart: unless-stopped
    networks:
      - zuribot-net

volumes:
  open-webui-data:

networks:
  zuribot-net:
    driver: bridge
